<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="contact-styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap"
      rel="stylesheet"
    />
    <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <script type="text/javascript">
        (function(){
            emailjs.init({
                publicKey: "2WXJnoGdo93sd7bU2",
            });
        })();
    </script>
  </head>
  <body>
    <!--navbar section-->
    <nav class="navbar">
      <div class="navbar__container">
        <a href="/" id="navbar__logo">TDS</a>
        <div class="navbar__toggle" id="mobile-menu">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
        <ul class="navbar__menu">
          <li class="navbar__item">
            <a href="/" class="navbar__links"> Home </a>
          </li>
          <li class="navbar__item">
            <a href="/about.html" class="navbar__links"> About </a>
          </li>
          <li class="navbar__btn">
            <a href="/contact.html" class="button">Contact us</a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Lets get chatting -->
    <div class="Contact__hero">
      <div  id="heading">Contact us</div>
      <h2>Let's get chatting</h2>
      <div class="contact-type">
        
        <h2>Message us on WhatsApp for a quicker response</h2>
        <h1>+91 93539 18023</1>
        <h2>or fill this form to send us an email!</h2>
      </div>
      <form id="contact-form" onsubmit="return sendMail(event)">
        <!-- Name (Mandatory) -->
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
        </div>

        <!-- Email -->
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email">
        </div>

        <!-- Phone Number -->
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone">
        </div>

        <!-- Services (Select any number) -->
        <div class="form-group">
            <label>Services I am interested in:</label>
            <div class="checkbox-group">
            <input type="checkbox" id="service1" name="service" value="UI/UX Audit">
            <label for="service1">UI/UX Audit</label><br>
            
            <input type="checkbox" id="service2" name="service" value="Graphic Design">
            <label for="service2">Graphic Design</label><br>
            
            <input type="checkbox" id="service3" name="service" value="Product Design">
            <label for="service3">Product Design</label>
            </div>
        </div>

        <!-- Message (Mandatory) -->
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" placeholder="We are here to help you succeed, let us know what you are looking for!" required></textarea>
        </div>

        <button type="submit">Send</button>
</form>
    </div>
    <!--FAQ-->
    <div class="FAQ"></div>
    <script src="contact.js"></script>
    
  </body>
</html>
